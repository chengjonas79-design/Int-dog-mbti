<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>萌宠联萌 · 入口图</title>
  <style>
    :root {
      --bg: #FFF8F5;
      --text: #2D2A26;
      --muted: #8C7E73;
      --shadow: 0 6px 20px rgba(180,120,100,.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 420px;
      width: 100%;
      padding: 40px 20px;
      text-align: center;
    }

    /* 品牌区 — 与首页完全一致 */
    .brand { margin-bottom: 28px; }
    .brand-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #FF6B81, #FF9A76);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 4px 16px rgba(255,107,129,.25);
    }
    .brand-icon svg { width: 28px; height: 28px; }
    .brand-title {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .brand-sub {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
    }
    .brand-sub span {
      display: inline-block;
      background: #FFF0F2;
      color: #E8556A;
      font-size: 13px;
      font-weight: 600;
      padding: 3px 12px;
      border-radius: 20px;
      margin-top: 8px;
    }

    /* 二维码区 — 融入背景 */
    .qr-section {
      padding: 8px 0;
    }
    .qr-box {
      display: inline-block;
      line-height: 0;
    }
    .qr-box canvas, .qr-box img { display: block; }

    /* 底部 — 与首页一致 */
    .footer {
      margin-top: 28px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }
    .footer span {
      display: inline-block;
      background: #FFF0F2;
      color: #E8556A;
      font-size: 13px;
      font-weight: 600;
      padding: 3px 12px;
      border-radius: 20px;
      margin-bottom: 8px;
    }

    /* 手机端适配 */
    @media (max-width: 480px) {
      body { align-items: flex-start; padding: 1.5vh 0; }
      .container { padding: 16px 18px; }
      .brand { margin-bottom: 16px; }
      .brand-icon { width: 40px; height: 40px; margin-bottom: 10px; }
      .brand-icon svg { width: 21px; height: 21px; }
      .brand-title { font-size: 21px; margin-bottom: 6px; }
      .brand-sub { font-size: 12.5px; }
      .brand-sub span { font-size: 12px; padding: 2px 10px; margin-top: 6px; }
      .qr-section { padding: 4px 0; }
      .footer { margin-top: 16px; font-size: 12px; }
      .footer span { font-size: 12px; padding: 2px 10px; margin-bottom: 6px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 品牌区 — 与首页完全一致 -->
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 21c-1.5 0-5-2.5-5-6.5 0-2 1-3.5 2.5-4C8 9.5 7 8 7 6.5 7 4.5 8.5 3 10.5 3c1 0 1.5.5 1.5.5s.5-.5 1.5-.5C15.5 3 17 4.5 17 6.5c0 1.5-1 3-2.5 4C16 11 17 12.5 17 14.5 17 18.5 13.5 21 12 21z" fill="white" opacity="0.9"/>
          <circle cx="8.5" cy="5.5" r="2" fill="white" opacity="0.7"/>
          <circle cx="15.5" cy="5.5" r="2" fill="white" opacity="0.7"/>
        </svg>
      </div>
      <h1 class="brand-title">萌宠联萌</h1>
      <p class="brand-sub">
        20 道趣味测试题，2 分钟解锁你家毛孩子的隐藏性格
        <br/><span id="testCount">已有 8,500+ 铲屎官完成测试</span>
      </p>
    </div>

    <!-- 二维码区 — 直接融入背景 -->
    <div class="qr-section">
      <div class="qr-box" id="qrBox"></div>
    </div>

    <!-- 底部 — 与首页一致 -->
    <p class="footer">
      <span>免费 · 无需注册</span><br/>
      完成后可加入【同品种×同性格】毛孩子陪伴社群
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    new QRCode(document.getElementById('qrBox'), {
      text: 'https://www.mclmpet.com/',
      width: 180,
      height: 180,
      colorDark: '#5A4338',
      colorLight: '#FFF8F5',
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
  <script src="https://static.cloudbase.net/cloudbase-js-sdk/2.17.3/cloudbase.full.js"></script>
  <script>
  (async function updateTestCount() {
    try {
      const app = cloudbase.init({ env: 'mengchong-dev-6g4qar062ad266bc' });
      await app.auth({ persistence: 'session' }).signInAnonymously();
      const db = app.database();
      const { total } = await db.collection('events').where({
        c: 'funnel', a: 'test_complete'
      }).count();
      const base = 8500;
      const raw = base + total;
      const rounded = Math.floor(raw / 100) * 100;
      const display = rounded.toLocaleString('en-US');
      const el = document.getElementById('testCount');
      if (el) el.textContent = `已有 ${display}+ 铲屎官完成测试`;
    } catch(e) { /* 静默失败，保持默认值 */ }
  })();
  </script>
</body>
</html>
