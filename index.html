<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>宠物PBTI · 毛孩子宠格测试</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>" />
  <meta name="description" content="20题2分钟，测出你家毛孩子的隐藏宠格——SBTI过时了，试试宠物版" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="宠物PBTI · 毛孩子宠格测试" />
  <meta property="og:description" content="20题2分钟，测出你家毛孩子的隐藏宠格——SBTI过时了，试试宠物版" />
  <style>
    :root {
      --bg: #FFF8F5;
      --text: #2D2A26;
      --muted: #8C7E73;
      --shadow: 0 6px 20px rgba(180,120,100,.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 420px;
      width: 100%;
      padding: 40px 20px;
      text-align: center;
    }

    /* 品牌区 */
    .brand { margin-bottom: 48px; }
    .brand-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #FF6B81, #FF9A76);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 4px 16px rgba(255,107,129,.25);
    }
    .brand-icon svg { width: 28px; height: 28px; }
    .brand-title {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .brand-sub {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
    }
    .brand-sub span {
      display: inline-block;
      background: #FFF0F2;
      color: #E8556A;
      font-size: 13px;
      font-weight: 600;
      padding: 3px 12px;
      border-radius: 20px;
      margin-top: 8px;
    }

    /* 卡片 */
    .cards { display: flex; flex-direction: column; gap: 14px; }
    .pet-card {
      display: flex;
      align-items: center;
      gap: 18px;
      background: #fff;
      border-radius: 18px;
      padding: 22px 24px;
      text-decoration: none;
      color: var(--text);
      box-shadow: var(--shadow);
      border: 1.5px solid rgba(0,0,0,.04);
      transition: all 0.2s ease;
      text-align: left;
    }
    .pet-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(180,120,100,.14);
    }
    .pet-card:active { transform: scale(0.98); }

    .card-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.5px;
    }
    .card-icon.dog { background: linear-gradient(135deg, #FFB347, #FF8C42); }
    .card-icon.cat { background: linear-gradient(135deg, #8CB4FF, #667EEA); }

    .card-body { flex: 1; min-width: 0; }
    .card-name {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
    .card-arrow {
      flex-shrink: 0;
      width: 20px; height: 20px;
      color: #ccc;
      transition: color 0.2s, transform 0.2s;
    }
    .pet-card:hover .card-arrow {
      color: #FF6B81;
      transform: translateX(3px);
    }

    /* 底部 */
    .footer {
      margin-top: 40px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
    }
    .footer span {
      display: inline-block;
      background: #FFF0F2;
      color: #E8556A;
      font-size: 13px;
      font-weight: 600;
      padding: 3px 12px;
      border-radius: 20px;
      margin-bottom: 8px;
    }

    /* 手机端 */
    @media (max-width: 480px) {
      body { align-items: flex-start; padding: 3vh 0; }
      .container { padding: 24px 18px; }
      .brand { margin-bottom: 28px; }
      .brand-icon { width: 48px; height: 48px; margin-bottom: 16px; }
      .brand-icon svg { width: 24px; height: 24px; }
      .brand-title { font-size: 24px; margin-bottom: 10px; }
    }

    /* 平板端 (iPad) */
    @media (min-width: 481px) and (max-width: 1024px) {
      body { padding: 4vh 0; }
      .container { max-width: 460px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 21c-1.5 0-5-2.5-5-6.5 0-2 1-3.5 2.5-4C8 9.5 7 8 7 6.5 7 4.5 8.5 3 10.5 3c1 0 1.5.5 1.5.5s.5-.5 1.5-.5C15.5 3 17 4.5 17 6.5c0 1.5-1 3-2.5 4C16 11 17 12.5 17 14.5 17 18.5 13.5 21 12 21z" fill="white" opacity="0.9"/>
          <circle cx="8.5" cy="5.5" r="2" fill="white" opacity="0.7"/>
          <circle cx="15.5" cy="5.5" r="2" fill="white" opacity="0.7"/>
        </svg>
      </div>
      <h1 class="brand-title">萌宠联萌</h1>
      <p class="brand-sub">
        你家毛孩子在背后怎么评价你？测了就知道。
        <br/><span id="testCount"></span>
      </p>
    </div>

    <div class="cards">
      <a class="pet-card" href="dog/">
        <div class="card-icon dog">DOG</div>
        <div class="card-body">
          <p class="card-name">狗狗PBTI测试</p>
          <p class="card-desc">你家狗到底是什么东西？</p>
        </div>
        <svg class="card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </a>
      <a class="pet-card" href="cat/">
        <div class="card-icon cat">CAT</div>
        <div class="card-body">
          <p class="card-name">猫咪PBTI测试</p>
          <p class="card-desc">你家猫凭什么这么嚣张？</p>
        </div>
        <svg class="card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </a>
    </div>

    <p class="footer">
      <span>免费 · 不需要毛孩子同意</span><br/>
      测完可加入【同品种×同性格】铲屎官互助群
    </p>
  </div>
  <script>
  /* 1. 立刻显示缓存数字，零延迟 */
  (function() {
    var cached = localStorage.getItem('testCountDisplay') || '8,500';
    var el = document.getElementById('testCount');
    if (el) el.textContent = '已有 ' + cached + '+ 铲屎官被审判';
  })();
  /* 2. 每小时最多查一次，避免每次打开都下载SDK */
  (function() {
    var lastFetch = parseInt(localStorage.getItem('testCountTime') || '0', 10);
    if (Date.now() - lastFetch < 3600000) return; /* 1小时内不重复查 */
    var s = document.createElement('script');
    s.src = 'https://static.cloudbase.net/cloudbase-js-sdk/2.17.3/cloudbase.full.js';
    s.async = true;
    s.onload = async function() {
      try {
        var app = cloudbase.init({ env: 'mengchong-dev-6g4qar062ad266bc' });
        await app.auth({ persistence: 'session' }).signInAnonymously();
        var db = app.database();
        var res = await db.collection('events').where({ c: 'funnel', a: 'test_complete' }).count();
        var rounded = Math.floor((6800 + res.total) / 100) * 100;
        var display = rounded.toLocaleString('en-US');
        localStorage.setItem('testCountDisplay', display);
        localStorage.setItem('testCountTime', String(Date.now()));
        var el = document.getElementById('testCount');
        if (el) el.textContent = '已有 ' + display + '+ 铲屎官被审判';
      } catch(e) { /* 静默失败，保持缓存值 */ }
    };
    document.body.appendChild(s);
  })();
  </script>
</body>
</html>
